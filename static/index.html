<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MBE 外延结构管理</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="app-title">
          <div>
            <h1>MBE 外延结构</h1>
            <span id="dbStatus">本地 SQLite</span>
          </div>
          <button id="newWaferBtn" class="icon-btn primary" title="新建外延片">+</button>
        </div>

        <div class="wafer-type-tabs" id="waferTypeTabs" role="tablist" aria-label="片子类型">
          <button class="active" data-wafer-type="formal" type="button">正式片</button>
          <button data-wafer-type="test" type="button">测试片</button>
        </div>

        <div class="sidebar-actions">
          <input id="searchInput" type="search" placeholder="搜索片号 / 结构" />
          <button id="importJsonBtn">导入 JSON</button>
          <button id="deleteSelectedWafersBtn" class="danger-btn" disabled>删除选中</button>
          <input id="jsonImportInput" type="file" accept=".json,application/json" multiple hidden />
        </div>

        <div id="waferList" class="wafer-list"></div>
      </aside>

      <main class="editor">
        <section class="wafer-header">
          <label>
            <span>片号</span>
            <input data-wafer-field="wafer_code" id="waferCode" />
          </label>
          <label>
            <span>尺寸</span>
            <input data-wafer-field="size" id="waferSize" />
          </label>
          <label class="wide">
            <span>结构名称</span>
            <input data-wafer-field="structure_name" id="structureName" />
          </label>
          <label>
            <span>日期</span>
            <input data-wafer-field="growth_date" id="growthDate" type="date" />
          </label>
          <label class="wide notes">
            <span>备注</span>
            <input data-wafer-field="notes" id="waferNotes" />
          </label>
        </section>

        <section class="wafer-header test-wafer-fields" id="testWaferFields" hidden>
          <label>
            <span>As 压束流比</span>
            <input data-wafer-field="as_beam_ratio" id="asBeamRatio" />
          </label>
          <label class="paired-field">
            <span>QD 成岛时间（s）/ 生长速率（ML/S）</span>
            <div class="paired-inputs">
              <input data-wafer-field="qd_islanding_time" id="qdIslandingTime" placeholder="成岛时间" />
              <input data-wafer-field="growth_rate" id="growthRate" placeholder="自动计算" readonly />
            </div>
          </label>
          <label>
            <span>QD 淀积量（成岛时间倍数）</span>
            <input data-wafer-field="qd_deposition" id="qdDeposition" />
          </label>
          <label>
            <span>再构转变温度（°C）</span>
            <input data-wafer-field="reconstruction_temp" id="reconstructionTemp" />
          </label>
          <label>
            <span>QD 生长温度（°C）</span>
            <input data-wafer-field="qd_growth_temp" id="qdGrowthTemp" />
          </label>
          <label>
            <span>QD 密度（cm<sup>-2</sup>）</span>
            <input data-wafer-field="qd_density" id="qdDensity" />
          </label>
          <label>
            <span>QD 体积中位数（nm<sup>3</sup>）</span>
            <input data-wafer-field="qd_volume" id="qdVolume" />
          </label>
          <label>
            <span>QD 高度（nm）</span>
            <input data-wafer-field="qd_height" id="qdHeight" />
          </label>
          <label>
            <span>QD 体积 CV</span>
            <input data-wafer-field="qd_volume_cv" id="qdVolumeCv" />
          </label>
        </section>

        <section class="toolbar">
          <div class="tool-group">
            <button data-action="add-layer">+ 层</button>
            <button data-action="add-inner-layer">+ 子层</button>
            <button data-action="undo-delete" id="undoDeleteBtn" disabled>撤回上一步</button>
          </div>
          <div class="tool-group">
            <button data-action="copy-item">复制</button>
            <button data-action="paste-item">粘贴</button>
            <button data-action="duplicate-wafer">复制整片</button>
          </div>
          <div class="tool-group">
            <button data-action="open-export">导出</button>
          </div>
          <span id="statusText" class="status-text"></span>
        </section>

        <section class="table-wrap">
          <table class="layer-table">
            <thead>
              <tr>
                <th class="actions-col"></th>
                <th>状态</th>
                <th>层名</th>
                <th>材料</th>
                <th>厚度 nm / QD ML</th>
                <th>周期</th>
                <th>单周期 nm</th>
                <th>掺杂浓度</th>
                <th>N/P</th>
                <th>生长温度</th>
                <th>QD</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="layerTableBody"></tbody>
          </table>
        </section>

        <section class="shortcuts">
          <div class="section-title">
            <h2>快捷项</h2>
            <div class="title-actions">
              <button id="addShortcutBtn">+ 项</button>
            </div>
          </div>
          <div id="shortcutList" class="shortcut-grid"></div>
        </section>
      </main>

      <aside class="inspector">
        <section class="visual-panel">
          <div class="section-title">
            <h2>结构图</h2>
            <span id="totalThickness">0 nm</span>
          </div>
          <div id="stackVisual" class="stack-visual"></div>
        </section>

        <section class="stats-panel">
          <div class="section-title">
            <h2>统计</h2>
          </div>
          <div id="statsContent" class="stats-content"></div>
        </section>
      </aside>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
